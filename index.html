<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKI Genap Kelas X – Materi Lengkap</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --emerald: #1A6B4A;
    --emerald-light: #2E9E6E;
    --navy: #0D1B2A;
    --cream: #FBF5E6;
    --rust: #C0522A;
    --sky: #1A7DA8;
    --purple: #5A3472;
    --bg: #0D1B2A;
    --card-bg: #162435;
    --text: #EEE6D0;
    --muted: #8CA0B5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── NAV / HOME ─── */
  #home {
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    background: radial-gradient(ellipse at 60% 0%, #1e3a5a 0%, #0D1B2A 60%);
    padding: 40px 20px 60px;
  }

  .home-header {
    text-align: center;
    margin-bottom: 50px;
  }

  .badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 5px 16px;
    border-radius: 20px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  h1.main-title {
    font-family: 'Amiri', serif;
    font-size: clamp(28px, 5vw, 52px);
    color: var(--gold-light);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .sub-title {
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
  }

  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 1100px;
  }

  .chapter-card {
    background: var(--card-bg);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    padding: 22px 20px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .chapter-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent-color, var(--gold));
  }

  .chapter-card:hover {
    transform: translateY(-4px);
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  .card-soal {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .card-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--gold-light);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .card-icon {
    font-size: 28px;
    margin-bottom: 10px;
  }

  /* ─── PAGE ─── */
  .page {
    display: none;
    min-height: 100vh;
    padding: 0 0 80px;
    animation: fadeIn 0.4s ease;
  }

  .page.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

  .page-hero {
    padding: 40px 24px 32px;
    position: relative;
  }

  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 24px;
    transition: background 0.2s;
    font-family: 'Nunito', sans-serif;
  }

  .back-btn:hover { background: rgba(255,255,255,0.14); }

  .page-number {
    font-size: 11px; font-weight: 900; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 8px;
  }

  .page-title {
    font-family: 'Amiri', serif;
    font-size: clamp(24px, 4vw, 42px);
    color: var(--gold-light);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .page-sub {
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
  }

  .page-content {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ─── CONTENT BLOCKS ─── */
  .section {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .section-title {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  .section-title::after {
    content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.2);
  }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
    padding: 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
  }

  .info-icon { font-size: 22px; flex-shrink: 0; }

  .info-label {
    font-size: 11px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase; color: var(--gold); margin-bottom: 3px;
  }

  .info-text { font-size: 15px; color: var(--text); line-height: 1.5; }

  .highlight-box {
    background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .highlight-box h4 { color: var(--gold-light); margin-bottom: 8px; font-size: 15px; }
  .highlight-box p, .highlight-box li { color: var(--text); font-size: 14px; line-height: 1.7; }

  .list-clean { list-style: none; }
  .list-clean li {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px; line-height: 1.6;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .list-clean li:last-child { border-bottom: none; }
  .list-clean li::before { content: '▸'; color: var(--gold); flex-shrink: 0; margin-top: 2px; }

  .timeline {
    position: relative; padding-left: 24px;
  }
  .timeline::before {
    content: ''; position: absolute; left: 6px; top: 0; bottom: 0;
    width: 2px; background: linear-gradient(to bottom, var(--gold), transparent);
  }
  .tl-item { position: relative; margin-bottom: 20px; }
  .tl-dot {
    position: absolute; left: -22px; top: 4px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--gold); border: 2px solid var(--bg);
  }
  .tl-year {
    font-size: 11px; font-weight: 900; letter-spacing: 1px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 3px;
  }
  .tl-text { font-size: 14px; color: var(--text); line-height: 1.6; }

  .compare-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .compare-col {
    background: rgba(255,255,255,0.04);
    border-radius: 10px; padding: 16px;
  }
  .compare-col h4 {
    font-size: 13px; font-weight: 800; margin-bottom: 10px;
    color: var(--gold-light); text-align: center;
    padding-bottom: 8px; border-bottom: 1px solid rgba(201,168,76,0.2);
  }
  .compare-col li {
    font-size: 13px; color: var(--text); padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    line-height: 1.5;
  }

  .key-box {
    background: rgba(192,82,42,0.15);
    border-left: 3px solid var(--rust);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .key-box.blue { background: rgba(26,125,168,0.15); border-color: var(--sky); }
  .key-box.purple { background: rgba(90,52,114,0.2); border-color: var(--purple); }
  .key-box.green { background: rgba(26,107,74,0.2); border-color: var(--emerald-light); }
  .key-box h4 { font-size: 13px; font-weight: 800; color: var(--gold-light); margin-bottom: 6px; }
  .key-box p, .key-box li { font-size: 14px; color: var(--text); line-height: 1.6; }

  .person-card {
    display: flex; gap: 14px; align-items: flex-start;
    background: rgba(255,255,255,0.04); border-radius: 10px;
    padding: 14px; margin-bottom: 12px;
  }
  .person-avatar {
    width: 48px; height: 48px; border-radius: 50%; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(201,168,76,0.2); flex-shrink: 0;
  }
  .person-name { font-size: 15px; font-weight: 800; color: var(--gold-light); margin-bottom: 3px; }
  .person-role { font-size: 12px; color: var(--gold); font-weight: 700; margin-bottom: 6px; }
  .person-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .quiz-hint {
    background: linear-gradient(135deg, rgba(26,107,74,0.2), rgba(26,107,74,0.05));
    border: 1px solid rgba(46,158,110,0.3);
    border-radius: 12px; padding: 16px; margin-top: 20px;
  }
  .quiz-hint-title {
    font-size: 12px; font-weight: 900; letter-spacing: 1px;
    text-transform: uppercase; color: var(--emerald-light); margin-bottom: 8px;
  }
  .quiz-hint p { font-size: 13px; color: var(--text); line-height: 1.6; }

  .pill { 
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 800; margin: 2px;
  }
  .pill-gold { background: rgba(201,168,76,0.2); color: var(--gold-light); }
  .pill-rust { background: rgba(192,82,42,0.2); color: #E8885A; }
  .pill-sky { background: rgba(26,125,168,0.2); color: #5AC8F5; }
  .pill-green { background: rgba(46,158,110,0.2); color: #5AE0A8; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .compare-grid { grid-template-columns: 1fr; }
    .chapter-grid { grid-template-columns: 1fr; }
  }

  /* ─── PROGRESS BAR ─── */
  .progress-bar-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(13,27,42,0.95);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 14px;
    z-index: 100; backdrop-filter: blur(10px);
  }
  .progress-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
  .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.3s; }
  .progress-count { font-size: 12px; color: var(--gold); font-weight: 900; white-space: nowrap; }

  /* bottom nav for pages */
  .page-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(13,27,42,0.95);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100; backdrop-filter: blur(10px);
  }
  .nav-btn {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: var(--text); padding: 8px 16px; border-radius: 10px;
    cursor: pointer; font-size: 13px; font-weight: 700;
    font-family: 'Nunito', sans-serif; transition: all 0.2s;
  }
  .nav-btn:hover { background: rgba(201,168,76,0.2); border-color: var(--gold); color: var(--gold-light); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-page-label { font-size: 12px; color: var(--muted); font-weight: 700; text-align: center; }
</style>
</head>
<body>

// ── RENDER HOME CARDS ──────────────────────────────────────────────────────
const grid = document.querySelector('.chapter-grid');
const visited = new Set(JSON.parse(localStorage.getItem('ski_visited') || '[]'));

function renderCards() {
  grid.innerHTML = '';
  chapters.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'chapter-card';
    card.style.setProperty('--accent-color', ch.color);
    const isDone = visited.has(ch.id);
    card.innerHTML = `
      <div class="card-soal">${ch.soal} ${isDone ? '✅' : ''}</div>
      <div class="card-icon">${ch.icon}</div>
      <div class="card-title">${ch.title}</div>
      <div class="card-desc">${ch.desc}</div>
    `;
    card.onclick = () => openPage(ch.id);
    grid.appendChild(card);
  });
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((visited.size / 35) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = visited.size + '/35';
}

// ── RENDER PAGES ───────────────────────────────────────────────────────────
const container = document.getElementById('pages-container');
chapters.forEach((ch, idx) => {
  const page = document.createElement('div');
  page.className = 'page';
  page.id = `page-${ch.id}`;
  page.innerHTML = `
    <div class="page-hero" style="background: linear-gradient(135deg, ${ch.color}18, transparent);">
      <button class="back-btn" onclick="goHome()">← Kembali ke Daftar</button>
      <div class="page-number" style="color:${ch.color}">${ch.soal} dari 35</div>
      <h2 class="page-title">${ch.icon} ${ch.title}</h2>
      <p class="page-sub">${ch.desc}</p>
    </div>
    <div class="page-content">
      ${ch.content}
    </div>
    <div class="page-nav">
      <button class="nav-btn" onclick="navigatePage(${ch.id}, -1)" ${idx === 0 ? 'disabled' : ''}>← Sebelumnya</button>
      <div class="nav-page-label">${ch.id} / 35</div>
      <button class="nav-btn" onclick="navigatePage(${ch.id}, 1)" ${idx === 34 ? 'disabled' : ''}>Selanjutnya →</button>
    </div>
  `;
  container.appendChild(page);
});

// ── NAVIGATION ─────────────────────────────────────────────────────────────
let currentPage = null;

function openPage(id) {
  document.getElementById('home').style.display = 'none';
  if (currentPage) document.getElementById(`page-${currentPage}`).classList.remove('active');
  document.getElementById(`page-${id}`).classList.add('active');
  currentPage = id;
  visited.add(id);
  localStorage.setItem('ski_visited', JSON.stringify([...visited]));
  window.scrollTo(0, 0);
}

function goHome() {
  if (currentPage) document.getElementById(`page-${currentPage}`).classList.remove('active');
  currentPage = null;
  document.getElementById('home').style.display = 'flex';
  renderCards();
  window.scrollTo(0, 0);
}

function navigatePage(currentId, dir) {
  const idx = chapters.findIndex(c => c.id === currentId);
  const next = chapters[idx + dir];
  if (next) openPage(next.id);
}

// ── INIT ───────────────────────────────────────────────────────────────────
renderCards();
</script>
